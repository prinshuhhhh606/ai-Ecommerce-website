<section class="products-section">
  <div class="section-header">
    <span class="section-badge">🔥 Trending Collection</span>

    <h2 class="section-title">
      Explore Our Best Selling Products
    </h2>

    <p class="section-description">
      Shop premium quality products with exclusive deals,
      fast delivery and unbeatable prices.
    </p>
  </div>

  <div class="products-container">

    <!-- Skeleton Loader -->
    <ng-container *ngIf="loading">

      <div
        class="product-card skeleton-card"
        *ngFor="let item of [1,2,3,4,5,6,7,8]"
      >
        <div class="skeleton-image"></div>

        <div class="product-content">
          <div class="skeleton-line category"></div>
          <div class="skeleton-line title"></div>
          <div class="skeleton-line price"></div>
          <div class="skeleton-button"></div>
        </div>
      </div>

    </ng-container>

    <!-- Products -->
    <ng-container *ngIf="!loading">

      <article
        class="product-card"
        *ngFor="let product of products"
      >
        <span class="product-badge">SALE</span>

        <div class="product-image">
          <button
            class="wishlist-btn"
            (click)="addToWishlist(product)"
          >
            <i class="fa-regular fa-heart"></i>
          </button>

          <img
            [src]="product.thumbnail"
            [alt]="product.title"
          />
        </div>

        <div class="product-content">
          <p class="category">
            {{ product.category }}
          </p>

          <h3 class="product-title">
            {{ product.title }}
          </h3>

          <div class="rating">
            ★★★★☆
            <span>(4.5)</span>
          </div>

          <div class="price-wrapper">
            <span class="price">
              ₹{{ product.price }}
            </span>

            <span class="old-price">
              ₹{{ product.price + 500 }}
            </span>
          </div>

          <button
            class="buy-btn"
            (click)="addToCart(product)"
          >
            Add To Cart
          </button>
        </div>
      </article>

    </ng-container>

  </div>

  <div class="pagination-container">
    <button
      class="page-btn"
      (click)="previousPage()"
      [disabled]="currentPage === 1"
    >
      ← Previous
    </button>

    <span class="page-info">
      {{ currentPage }} / {{ totalPages }}
    </span>

    <button
      class="page-btn"
      (click)="nextPage()"
      [disabled]="currentPage === totalPages"
    >
      Next →
    </button>
  </div>
</section>
