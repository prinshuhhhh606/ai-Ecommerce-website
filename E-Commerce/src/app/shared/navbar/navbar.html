<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
<nav class="navbar">

  <!-- Logo -->
  <div class="logo">
    <a routerLink="/">ShopEase</a>
  </div>

  <!-- Search -->
  <div class="search-box">
      <button (click)="search()">  <i class="fa-solid fa-search search-icon"></i></button>
    <input
      type="text"
      placeholder="Search products..."
      [formControl]="product"
    />

     
  <button (click)="startVoiceSearch()" class="voice-btn">
  <i class="fa-solid fa-microphone"></i>
</button>



  <!-- Suggestions -->
  <div
    class="suggestions"
    *ngIf="filteredProducts.length"
  >
    <div
      class="suggestion-item"
      *ngFor="let item of filteredProducts"
      (click)="selectProduct(item)"
    >
      {{ item.title }}
    </div>
  </div>



  </div>

  <!-- Menu -->
  <ul class="nav-links">

    <li><a routerLink="/">Home</a></li>

    <li><a routerLink="/product">Products</a></li>

    <li><a>Categories</a></li>

    <li><a routerLink="/my-orders">Orders</a></li>

    <li>
      <a (click)="wishlist()">
        ❤️ Wishlist
      </a>
    </li>

    <li>
      <a (click)="AIsearch()">
        🤖 AI Search
      </a>
    </li>

  </ul>

  <!-- Right Side -->
  <div class="nav-icons">

    <div
      class="cart"
      (click)="cart()"
    >
      🛒

      <span class="cart-count">
        {{ cartService.getCartItems().length }}
      </span>
    </div>

    <button
      class="login"
      *ngIf="!isLoggedIn"
      (click)="Login()"
    >
    
    <i class="fa-regular fa-user"></i>
    Login
    </button>

    <button
      class="logout"
      *ngIf="isLoggedIn"
      (click)="logout()"
    >
     <i class="fa-solid fa-right-from-bracket"></i>
       Logout
    </button>

  </div>

</nav>
