<nav class="navbar">

  <!-- Logo -->
  <div class="logo">
    <a routerLink="/">ShopEase</a>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input
      type="text"
      placeholder="Search products..."
      [formControl]="product"
    />

    <button (click)="search()">
      🔍
    </button>
  </div>

  <!-- Menu -->
  <ul class="nav-links">

    <li><a routerLink="/">Home</a></li>

    <li><a routerLink="/product">Products</a></li>

    <li><a>Categories</a></li>

    <li><a routerLink="/my-orders">Orders</a></li>

    <li>
      <a (click)="wishlist()">
        ❤️ Wishlist
      </a>
    </li>

    <li>
      <a (click)="AIsearch()">
        🤖 AI Search
      </a>
    </li>

  </ul>

  <!-- Right Side -->
  <div class="nav-icons">

    <div
      class="cart"
      (click)="cart()"
    >
      🛒

      <span class="cart-count">
        {{ cartService.getCartItems().length }}
      </span>
    </div>

    <button
      class="login-btn"
      *ngIf="!isLoggedIn"
      (click)="Login()"
    >
      👤 Login
    </button>

    <button
      class="logout-btn"
      *ngIf="isLoggedIn"
      (click)="logout()"
    >
      🚪 Logout
    </button>

  </div>

</nav>
