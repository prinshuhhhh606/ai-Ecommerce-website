<h2>Cart Items</h2>

<div class="product-container">

  <div
    class="product-card"
    *ngFor="let item of cartService.getCartItems(); let i = index"
  >

<img
  [src]="item.image"
  [alt]="item.title"
/>

    <h3>{{ item.title }}</h3>

    <p class="price">
      ₹ {{ item.price }}
    </p>

    <p class="category">
      {{ item.category }}
    </p>

    <button (click)="removeItem(item)">
      Remove
    </button>

  </div>

</div>

<div class="checkout-section">
  <button class="checkout-btn" (click)="proceedToCheckout()">
    Proceed To Checkout
  </button>
</div>
