<div class="wallet-container">

  <!-- Header -->
  <div class="header">
    <h2>Wallet Dashboard</h2>

    <button class="credit-btn">
      + Add Credit
    </button>
  </div>

  <!-- Wallet Cards -->
  <div class="wallet-cards">

    <div class="card">
      <h4>Total Balance</h4>
      <h2>₹50,000</h2>
    </div>

    <div class="card">
      <h4>Total Credit</h4>
      <h2>₹80,000</h2>
    </div>

    <div class="card">
      <h4>Total Debit</h4>
      <h2>₹30,000</h2>
    </div>

    <div class="card">
      <h4>This Month</h4>
      <h2>₹12,500</h2>
    </div>

  </div>

  <!-- Search -->
  <div class="search-section">
    <input
      type="text"
      placeholder="Search transactions..."
      [(ngModel)]="searchText"
    />
  </div>

  <!-- Transaction Table -->
  <div class="table-container">

    <table>

      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Description</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let txn of transactions">
          <td>{{ txn.id }}</td>
          <td>{{ txn.date }}</td>
          <td>{{ txn.description }}</td>

          <td>
            <span
              [class.credit]="txn.type === 'Credit'"
              [class.debit]="txn.type === 'Debit'">
              {{ txn.type }}
            </span>
          </td>

          <td>₹{{ txn.amount }}</td>

          <td>
            <span
              [class.success]="txn.status === 'Success'"
              [class.pending]="txn.status === 'Pending'">
              {{ txn.status }}
            </span>
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>
