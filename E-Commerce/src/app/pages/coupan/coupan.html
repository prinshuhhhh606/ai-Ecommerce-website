<div class="coupon-card">

    <div class="coupon-header">
        <h3>Apply Coupon</h3>
        <p>Save more on your order</p>
    </div>

    <div class="coupon-input-box">

        <input
            type="text"
            placeholder="Enter coupon code"
            [(ngModel)]="couponCode">

        <button
            class="apply-btn"
            (click)="applyCoupon()">
            Apply
        </button>

    </div>

    <div class="available-coupons">

        <h4>Available Coupons</h4>

        <div
            class="coupon-item"
            *ngFor="let coupon of coupons">

            <div class="coupon-info">
                <span class="code">{{ coupon.code }}</span>
                <p>{{ coupon.description }}</p>
            </div>

            <button
                class="use-btn"
                (click)="useCoupon(coupon.code)">
                Apply
            </button>

        </div>

    </div>

</div>
